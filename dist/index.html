		<main class="mx-auto max-w-5xl px-4 py-8">
			<!-- 工具介绍 -->
			<div class="mb-8 rounded-2xl bg-indigo-500 p-6 text-white shadow-xl shadow-brand-500/10">
				<h2 class="text-xl font-bold">创建重定向链接</h2>
				<p class="mt-2 text-sm text-brand-100 max-w-2xl">一个简单、快速的链接跳转与管理工具。支持短链接生成、访问统计以及自定义跳转页。</p>
			</div>
			<!-- 提交表单 -->
			<form action="/shortlink" method="post" target="result_iframe">
				<div>
					<label class="block text-sm font-medium text-slate-600">目标 URL *</label>
					<input
						class="mt-1.5 w-full rounded-lg border border-slate-300 px-3 py-2 text-sm shadow-sm focus:border-brand-500 focus:outline-none focus:ring-1 focus:ring-brand-500 disabled:bg-slate-50"
						placeholder="https://example.com"
						type="url"
						id="url"
						name="url"
						autocomplete="on"
						required
					/>
				</div>
				<div class="text-sm font-medium text-slate-600 p-4 *:px-2">
					<input type="radio" checked name="expireType" id="forever" value="" /><label for="forever">永久有效</label>
					<input type="radio" name="expireType" id="future" value="1" /><label for="future">设置过期时间</label>
				</div>
				<input class="hidden" type="datetime-local" name="expire" id="expireInfo" />
				<!-- 提交按钮 -->
				<button
					id="submitBtn"
					type="submit"
					class="peer w-full bg-sky-400 flex justify-center items-center gap-2 rounded-xl py-3 px-4 text-base font-bold text-white shadow-lg focus:outline-none focus:ring-2 focus:ring-offset-2 transition-all"
				>
					<span class="flex items-center gap-2">
						<svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5">
							<path
								stroke-linecap="round"
								stroke-linejoin="round"
								d="M5.25 5.653c0-.856.917-1.398 1.667-.986l11.54 6.347a1.125 1.125 0 0 1 0 1.972l-11.54 6.347a1.125 1.125 0 0 1-1.667-.986V5.653Z"
							/>
						</svg>
						生成重定向链接
					</span>
				</button>
			</form>
			<!-- 结果显示 -->
			<div id="result"></div>
			<iframe name="result_iframe" width="100%"></iframe>
		</main>

		<script>
			const futureField = document.getElementById('future');
			const foreverField = document.getElementById('forever');
			const expireInfo = document.getElementById('expireInfo');
			futureField.addEventListener('change', () => {
				expireInfo.style.display = 'block';
				expireInfo.setAttribute('required', '');
			});
			foreverField.addEventListener('change', () => {
				expireInfo.value = '';
				expireInfo.removeAttribute('required');
				expireInfo.style.display = 'none';
			});
		</script>
	</body>
</html>
